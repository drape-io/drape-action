name: Release

on:
  push:
    tags:
      # Match only full vX.Y.Z tags. The rolling major tag (v1, v2, etc.)
      # is a ref convention for action consumers and should not produce
      # its own GitHub Release entry.
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes
