name: 'Drape Upload'
description: 'Upload coverage, tests, scans, or lint results to Drape and post PR comments'
author: 'drape-io'
branding:
  icon: 'upload-cloud'
  color: 'blue'

inputs:
  # Required
  command:
    description: 'Upload command: coverage, tests, scan, lint'
    required: true
  file:
    description: 'File path or glob pattern to upload'
    required: true
  token:
    description: 'Drape API token'
    required: true

  # Organization/repo (auto-detected from github context)
  org:
    description: 'Drape organization slug (default: derived from github.repository_owner)'
    required: false
  repo:
    description: 'Drape repository name (default: github.repository)'
    required: false

  # CLI version
  cli-version:
    description: 'Drape CLI version to install (default: latest)'
    required: false
    default: 'latest'

  # Common flags
  api-url:
    description: 'Drape API URL'
    required: false
    default: 'https://app.drape.io'
  wait:
    description: 'Wait for server-side processing'
    required: false
    default: 'true'
  timeout:
    description: 'Max wait time in seconds'
    required: false
    default: '120'
  verbose:
    description: 'Enable verbose CLI output'
    required: false
    default: 'false'
  group:
    description: 'Group label(s) for this upload'
    required: false

  # Coverage-specific
  format:
    description: 'File format (coverage: cobertura/lcov/go, tests: junit/ctrf, scan: sarif/cyclonedx, lint: sarif)'
    required: false
  path-prefix:
    description: 'Path prefix mapping for coverage files'
    required: false
  target-branch:
    description: 'Target branch for PR diff (auto-detected)'
    required: false

  # Scan-specific
  scan-name:
    description: 'Scan name (e.g. docker image name)'
    required: false
  scan-tag:
    description: 'Scan tag (e.g. image tag, version)'
    required: false
  scan-type:
    description: 'Scan type: image or dependency'
    required: false
  fail-on-vulnerabilities:
    description: 'Exit non-zero if unsuppressed vulnerabilities found'
    required: false
    default: 'false'
  fail-on-severity:
    description: 'Minimum severity to fail on: critical, high, medium, low, any'
    required: false
    default: 'medium'

  # Tests-specific
  job-name:
    description: 'CI job name (auto-detected)'
    required: false

  # Comment configuration
  comment:
    description: 'Post a PR comment with results'
    required: false
    default: 'true'
  comment-header:
    description: 'Sticky comment header ID (default: drape-{command})'
    required: false
  github-token:
    description: 'GitHub token for posting PR comments'
    required: false
    default: ${{ github.token }}

outputs:
  exit-code:
    description: 'CLI exit code'
    value: ${{ steps.upload.outputs.exit-code }}
  result-json:
    description: 'Raw JSON result from the CLI'
    value: ${{ steps.upload.outputs.result-json }}
  passed:
    description: 'Whether the check passed (true/false)'
    value: ${{ steps.upload.outputs.passed }}
  comment-body:
    description: 'The generated comment markdown'
    value: ${{ steps.comment.outputs.body }}

runs:
  using: 'composite'
  steps:
    - name: Install Drape CLI
      id: install
      shell: bash
      run: ${{ github.action_path }}/scripts/install-cli.sh
      env:
        CLI_VERSION: ${{ inputs.cli-version }}

    - name: Run upload
      id: upload
      shell: bash
      run: ${{ github.action_path }}/scripts/run-upload.sh
      env:
        DRAPE_TOKEN: ${{ inputs.token }}
        DRAPE_API_URL: ${{ inputs.api-url }}
        DRAPE_ORG: ${{ inputs.org }}
        DRAPE_REPO: ${{ inputs.repo }}
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_FILE: ${{ inputs.file }}
        INPUT_WAIT: ${{ inputs.wait }}
        INPUT_TIMEOUT: ${{ inputs.timeout }}
        INPUT_VERBOSE: ${{ inputs.verbose }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_PATH_PREFIX: ${{ inputs.path-prefix }}
        INPUT_TARGET_BRANCH: ${{ inputs.target-branch }}
        INPUT_SCAN_NAME: ${{ inputs.scan-name }}
        INPUT_SCAN_TAG: ${{ inputs.scan-tag }}
        INPUT_SCAN_TYPE: ${{ inputs.scan-type }}
        INPUT_FAIL_ON_VULNS: ${{ inputs.fail-on-vulnerabilities }}
        INPUT_FAIL_ON_SEVERITY: ${{ inputs.fail-on-severity }}
        INPUT_JOB_NAME: ${{ inputs.job-name }}
        INPUT_GROUP: ${{ inputs.group }}

    - name: Generate comment
      id: comment
      if: inputs.comment == 'true' && github.event_name == 'pull_request'
      shell: bash
      run: ${{ github.action_path }}/scripts/generate-comment.sh
      env:
        INPUT_COMMAND: ${{ inputs.command }}
        RESULT_JSON: ${{ steps.upload.outputs.result-json }}
        EXIT_CODE: ${{ steps.upload.outputs.exit-code }}
        UPLOAD_STDERR: ${{ steps.upload.outputs.stderr }}

    - name: Post PR comment
      if: inputs.comment == 'true' && github.event_name == 'pull_request' && steps.comment.outputs.body != ''
      uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3.0.2
      with:
        header: ${{ inputs.comment-header || format('drape-{0}', inputs.command) }}
        message: ${{ steps.comment.outputs.body }}
        GITHUB_TOKEN: ${{ inputs.github-token }}

    - name: Propagate CLI exit code
      if: steps.upload.outputs.exit-code != '0'
      shell: bash
      env:
        CLI_EXIT_CODE: ${{ steps.upload.outputs.exit-code }}
      run: |
        echo "::error::Drape CLI exited with code ${CLI_EXIT_CODE}"
        exit "${CLI_EXIT_CODE}"
