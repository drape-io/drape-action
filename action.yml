name: 'Drape Upload'
description: 'Upload coverage, tests, scans, or lint results to Drape and post PR comments'
author: 'drape-io'
branding:
  icon: 'upload-cloud'
  color: 'blue'

inputs:
  # Required
  command:
    description: 'Upload command: coverage, tests, scan, lint'
    required: true
  file:
    description: 'File path or glob pattern to upload'
    required: true
  api-key:
    description: 'Drape API key'
    required: true

  # Organization/repo (auto-detected from github context)
  org:
    description: 'Drape organization slug (default: derived from github.repository_owner)'
    required: false
  repo:
    description: 'Drape repository name (default: github.repository)'
    required: false

  # CLI version
  cli-version:
    description: 'Drape CLI version to install (default: latest)'
    required: false
    default: 'latest'

  # Common flags
  api-url:
    description: 'Drape API URL'
    required: false
    default: 'https://app.drape.io'
  wait:
    description: 'Wait for server-side processing'
    required: false
    default: 'true'
  timeout:
    description: 'Max wait time in seconds'
    required: false
    default: '120'
  verbose:
    description: 'Enable verbose CLI output'
    required: false
    default: 'false'
  group:
    description: 'Group label(s) for this upload'
    required: false

  # Coverage-specific
  format:
    description: 'File format (coverage: cobertura/lcov/go, tests: junit/ctrf, scan: sarif/cyclonedx, lint: sarif)'
    required: false
  path-prefix:
    description: 'Path prefix mapping for coverage files'
    required: false
  target-branch:
    description: 'Target branch for PR diff (auto-detected)'
    required: false

  # Scan-specific
  scan-name:
    description: 'Scan name (e.g. docker image name)'
    required: false
  scan-tag:
    description: 'Scan tag (e.g. image tag, version)'
    required: false
  scan-type:
    description: 'Scan type: image or dependency'
    required: false
  fail-on-vulnerabilities:
    description: 'Exit non-zero if unsuppressed vulnerabilities found'
    required: false
    default: 'false'
  fail-on-severity:
    description: 'Minimum severity to fail on: critical, high, medium, low, any'
    required: false
    default: 'medium'

  # Tests-specific
  job-name:
    description: 'CI job name (auto-detected)'
    required: false

  # Comment configuration
  comment:
    description: 'Post a PR comment with results'
    required: false
    default: 'true'
  comment-header:
    description: 'Sticky comment header ID (default: drape-{command})'
    required: false
  github-token:
    description: 'GitHub token for posting PR comments'
    required: false
    default: ${{ github.token }}

outputs:
  exit-code:
    description: 'CLI exit code'
  result-json:
    description: 'Raw JSON result from the CLI'
  passed:
    description: 'Whether the check passed (true/false)'
  comment-body:
    description: 'The generated comment markdown'

runs:
  using: 'node24'
  main: 'dist/index.js'
